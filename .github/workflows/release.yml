name: Build + Sign + Release

on:
  push:
    tags:
      - 'v*'      # v22, v22.1.0 vb. tag push'unda release çıkar
  workflow_dispatch:
    inputs:
      versionCode:
        description: "versionCode (manuel build için)"
        required: false
        default: ""

permissions:
  contents: write   # gh release create için

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.BRAVOPRO_KEYSTORE_BASE64 }}
        run: |
          mkdir -p signing
          echo "$KEYSTORE_BASE64" | base64 -d > signing/bravopro-release.jks
          ls -la signing/

      - name: Write keystore.properties
        env:
          STORE_PASS: ${{ secrets.BRAVOPRO_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.BRAVOPRO_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.BRAVOPRO_KEY_PASSWORD }}
        run: |
          cat > signing/keystore.properties <<EOF
          storeFile=signing/bravopro-release.jks
          storePassword=$STORE_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF

      - name: Resolve versionCode from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VC=$(echo "$TAG" | grep -oE '[0-9]+' | head -n1)
          [ -z "$VC" ] && VC="${{ inputs.versionCode }}"
          [ -z "$VC" ] && VC="22"
          echo "versionCode=$VC" >> "$GITHUB_OUTPUT"
          echo "Using versionCode=$VC"

      - name: Build release APKs
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
                    :externalapp:smartcamera:assembleRelease \
                    :externalapp:emergency:assembleRelease \
                    :externalapp:voice:assembleRelease \
                    -PNWD_VERSION_CODE=${{ steps.ver.outputs.versionCode }} \
                    --stacktrace

      - name: Verify APK signatures
        run: |
          BT=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -n1)
          APKS=$(find . -path '*/build/outputs/apk/release/*.apk')
          for APK in $APKS; do
            echo "=== $APK ==="
            "$ANDROID_SDK_ROOT/build-tools/$BT/apksigner" verify --print-certs "$APK"
          done

      - name: Stage release artifacts
        run: |
          mkdir -p release_out
          cp app/build/outputs/apk/release/app-release.apk release_out/app-release.apk
          cp externalapp/smartcamera/build/outputs/apk/release/smartcamera-release.apk release_out/ || true
          cp externalapp/emergency/build/outputs/apk/release/emergency-release.apk release_out/ || true
          cp externalapp/voice/build/outputs/apk/release/voice-release.apk release_out/ || true
          ls -la release_out/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release_out/*.apk \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release. versionCode=${{ steps.ver.outputs.versionCode }}" \
            --latest
