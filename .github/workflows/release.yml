name: Build + Sign + Release

on:
  push:
    tags:
      - 'v*'      # v22, v22.1.0 vb. tag push'unda release çıkar
  workflow_dispatch:
    inputs:
      versionCode:
        description: "versionCode (manuel build için)"
        required: false
        default: ""

permissions:
  contents: write   # gh release create için

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.BRAVOPRO_KEYSTORE_BASE64 }}
        run: |
          mkdir -p signing
          echo "$KEYSTORE_BASE64" | base64 -d > signing/bravopro-release.jks
          ls -la signing/

      - name: Write keystore.properties
        env:
          STORE_PASS: ${{ secrets.BRAVOPRO_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.BRAVOPRO_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.BRAVOPRO_KEY_PASSWORD }}
        run: |
          cat > signing/keystore.properties <<EOF
          storeFile=signing/bravopro-release.jks
          storePassword=$STORE_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF

      - name: Resolve versionCode from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VC=$(echo "$TAG" | grep -oE '[0-9]+' | head -n1)
          [ -z "$VC" ] && VC="${{ inputs.versionCode }}"
          [ -z "$VC" ] && VC="22"
          echo "versionCode=$VC" >> "$GITHUB_OUTPUT"
          echo "Using versionCode=$VC"

      - name: Build release APK (app only — externalapp stubs come later)
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
                    -PNWD_VERSION_CODE=${{ steps.ver.outputs.versionCode }} \
                    --stacktrace

      - name: Force-resign APK with v1+v2+v3 (AGP atlıyor — Android 16 v2 stripe arıyor)
        env:
          STORE_PASS: ${{ secrets.BRAVOPRO_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.BRAVOPRO_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.BRAVOPRO_KEY_PASSWORD }}
        run: |
          BT=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -n1)
          APK=app/build/outputs/apk/release/app-release.apk
          # --min-sdk-version 21 → apksigner manifest'in minSdk=33'ine
          # rağmen v1+v2+v3 stripe'larını yazmaya zorlanır (install için
          # manifest minSdk yine 33; bu sadece imza scheme kararını etkiler).
          "$ANDROID_SDK_ROOT/build-tools/$BT/apksigner" sign \
            --ks signing/bravopro-release.jks \
            --ks-pass pass:"$STORE_PASS" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass pass:"$KEY_PASS" \
            --min-sdk-version 21 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --v4-signing-enabled false \
            "$APK"
          "$ANDROID_SDK_ROOT/build-tools/$BT/apksigner" verify --verbose --print-certs "$APK"

      - name: Stage release artifacts
        run: |
          mkdir -p release_out
          cp app/build/outputs/apk/release/app-release.apk release_out/app-release.apk
          ls -la release_out/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release_out/*.apk \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release. versionCode=${{ steps.ver.outputs.versionCode }}" \
            --latest
